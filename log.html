<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>log</title>
    <style>
        /* 공통 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        ul {
            list-style: none;
        }
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #fbf9f4;
            color: #3e2723;
            line-height: 1.7;
        }
        
        /* 헤더 & 푸터 */
        header, footer {
            background-color: #4e3629;
            color: #f5f2eb;
            text-align: center;
            padding: 25px 20px;
        }
        header h1 {
            font-weight: bold;
            font-size: 2em;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        header h1 a {
            color: #f5f2eb;
            text-decoration: none;
        }
        header h1 a:hover {
            color: #f5f2eb;
            text-decoration: none;
        }
        header p {
            font-size: 0.95em;
            color: #d7ccc8;
        }

        /* 레이아웃 구분 */
        .container {
            overflow: auto;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* left : 메뉴 */
        .menu {
            float: left;
            width: 20%;
            text-align: center;
        }
        .menu a {
            background-color: #ebdccb;
            padding: 12px;
            margin-top: 7px;
            display: block;
            width: 100%;
            font-weight: bold;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .menu a:link, .menu a:visited {
            text-decoration: none;
            color: #5d4037;
        }
        .menu a:hover {
            background-color: #8d6e63;
            color: #ffffff;
        }
        .menu a:active, .menu a.active {
            background-color: #4e3629;
            color: #ffffff;
        }

        /* center : 메인 */
        .main {
            float: left;
            width: 60%;
            padding: 0 25px;
        }
        .page-title {
            font-size: 1.6em;
            color: #4e3629;
            margin-bottom: 25px;
            padding-bottom: 8px;
            border-bottom: 2px solid #8d6e63;
        }

        .log-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }
        .log-item {
            background-color: #ffffff;
            border: 1px solid #d7ccc8;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(78, 54, 41, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .log-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 16px rgba(78, 54, 41, 0.12);
        }
        .log-cover {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 12px;
            box-shadow: 0 2px 6px rgba(78, 54, 41, 0.1);
        }
        .log-meta {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 100%;
        }
        .log-meta .stars {
            color: #d3a625;
            font-size: 1.1em;
            letter-spacing: 1.5px;
        }
        .log-meta .date {
            font-size: 0.85em;
            color: #8d6e63;
            font-weight: bold;
        }

        /* right : 사이드바 */
        .right {
            background-color: #f3e9dc; 
            float: left;
            width: 20%;
            padding: 20px;
            margin-top: 7px;
            border-radius: 4px;
            border-left: 3px solid #8d6e63;
        }
        .right h3 {
            font-size: 1.1em;
            margin-bottom: 12px;
            color: #4e3629;
            border-bottom: 1px solid #d7ccc8;
            padding-bottom: 5px;
        }
        .tracker-box {
            background-color: #ffffff;
            border: 1px solid #d7ccc8;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(78, 54, 41, 0.04);
        }
        .tracker-box h5 {
            font-size: 1em;
            margin-bottom: 10px;
            color: #4e3629;
        }
        .tracker-stat {
            font-size: 0.85em;
            color: #5d4037;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        /* add 버튼 */
        .floating-add-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background-color: #8d6e63;
            color: #ffffff;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(78, 54, 41, 0.3);
            transition: transform 0.2s ease, background-color 0.2s ease;
            z-index: 1000;
        }
        .floating-add-btn:hover {
            background-color: #4e3629;
            transform: translateY(-5px);
        }

        /* 반응형 */
        @media only screen and (max-width: 768px) {
            .menu, .main, .right {
                width: 100%;
                float: none;
                padding: 10px 0;
            }
            .main { padding: 20px 5px; }
            .log-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="index.html">Archive</a></h1>
        <p>Book & Film</p>
    </header>

    <div class="container">
        <div class="menu">
            <a href="calendar.html">Calendar</a>
            <a href="book.html">Books</a>
            <a href="film.html">Films</a>
            <a href="quote.html">Quotes</a>
            <a href="log.html" class="active">Logs</a>
        </div>

        <div class="main">
            <h1 class="page-title">Archive Log</h1>
            
            <ul class="log-grid">
                <li class="log-item">
                    <img src="img/book1.jpg" alt="기록 1" class="log-cover" onerror="this.src='https://via.placeholder.com/150x200?text=Photo'">
                    <div class="log-meta">
                        <span class="stars">★★★★★</span>
                        <span class="date">2026.05.05</span>
                    </div>
                </li>

                <li class="log-item">
                    <img src="img/film1.jpg" alt="기록 2" class="log-cover" onerror="this.src='https://via.placeholder.com/150x200?text=Photo'">
                    <div class="log-meta">
                        <span class="stars">★★★★★</span>
                        <span class="date">2026.05.11</span>
                    </div>
                </li>

                <li class="log-item">
                    <img src="img/log3.jpg" alt="기록 3" class="log-cover" onerror="this.src='https://via.placeholder.com/150x200?text=Photo'">
                    <div class="log-meta">
                        <span class="stars">☆☆☆☆☆</span>
                        <span class="date">-</span>
                    </div>
                </li>

                <li class="log-item">
                    <img src="img/log4.jpg" alt="기록 4" class="log-cover" onerror="this.src='https://via.placeholder.com/150x200?text=Photo'">
                    <div class="log-meta">
                        <span class="stars">☆☆☆☆☆</span>
                        <span class="date">-</span>
                    </div>
                </li>
            </ul>
        </div>

        <div class="right">
            <h3>Archive Tracker</h3>
            
            <div class="tracker-box">
                <h5>🖼️ Total Logs</h5>
                <div class="tracker-stat" style="margin-top: 10px;">
                    <span>누적 기록 수</span><strong>2개</strong>
                </div>
                <div class="tracker-stat" style="margin-top: 8px;">
                    <span>이번 달 기록</span><strong>2개</strong>
                </div>
            </div>
        </div>
    </div>

    <a href="add.html" class="floating-add-btn" title="add">+</a>

    <footer>
        <p>COPYRIGHT © 유은지 All Rights Reserved.</p>
    </footer>
</body>
</html>
